# Alembic configuration for the BDGO auth / sessions Postgres database.
# The CRM database is NOT managed by Alembic — its schema lives in
# crm_db.py and its SQLite backend is primarily a read replica.
#
# Usage:
#   # Run pending migrations (called automatically on startup; safe to
#   # run manually too):
#   alembic upgrade head
#
#   # Mark an existing DB as already being at the latest revision —
#   # needed once, on first rollout to an existing prod DB that was
#   # created via the old CREATE-TABLE-IF-NOT-EXISTS auto-init:
#   alembic stamp head
#
#   # Generate a new revision (review the diff before committing):
#   alembic revision --autogenerate -m "add X column"

[alembic]
script_location = migrations
prepend_sys_path = .

# Placeholder — env.py reads the real URL from config.DATABASE_URL at runtime.
sqlalchemy.url = driver://user:pass@host/dbname

# File naming: YYYYMMDD_HHMM_<slug>_<revision>.py keeps versions sortable
# chronologically in the filesystem without relying on alembic's internal
# revision graph.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s_%%(rev)s
timezone = UTC

[post_write_hooks]
# None configured. Add formatters here if/when we standardise on one.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
