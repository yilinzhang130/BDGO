# ruff.toml — Python linter + formatter 配置
#
# 这个文件告诉 ruff 要检查哪些规则、忽略哪些文件。
# CI 会跑两条命令:
#   ruff check .          —— 静态分析,报告代码问题
#   ruff format --check . —— 验证格式是否合规(不修改,只报差异)
#
# 本地想一次修好所有可自动修复的问题,运行:
#   ruff check --fix . && ruff format .

line-length = 100
target-version = "py311"

# 不扫这些目录 —— 构建产物、虚拟环境、自动生成的迁移脚本、Claude Code 内部 worktree
exclude = [
    ".venv",
    ".claude",
    "api/.venv",
    "api/migrations/versions",
    "frontend/.next",
    "frontend/node_modules",
    "__pycache__",
]

[lint]
# 启用的规则集(宽松版,避免 E501 等风格规则淹没真正的问题):
#   E4/E7/E9 —— pycodestyle 真错类(import 顺序、语法、运行时)
#   F        —— pyflakes(未使用的变量、未定义的名字等)
#   I        —— isort(import 排序)
#   UP       —— pyupgrade(建议用新版 Python 语法)
#   B        —— flake8-bugbear(常见 bug 模式)
#   SIM      —— flake8-simplify(可简化的写法)
select = ["E4", "E7", "E9", "F", "I", "UP", "B", "SIM"]

# 全局忽略 —— 这些不是 bug,是风格或框架约定
ignore = [
    "E402",    # import 不在顶部: 项目里多处是 sys.path.insert + logging 后 import, 属合法模式
    "SIM105",  # contextlib.suppress vs try/except/pass: 纯 taste, 不阻塞
    "SIM102",  # 嵌套 if 合并: 纯风格
    "SIM108",  # 用三元代替 if/else: 纯风格
    "E731",    # lambda 赋值: 很少出现, 不值得阻塞
    "B905",    # zip(..., strict=...): 3.10+ 建议, 全项目渐进改
]

# 按文件豁免 —— 目标文件里的特定规则关掉,不影响其他文件
[lint.per-file-ignores]
"api/tests/**/*.py" = ["B011", "B017"]  # 测试里的 assert False 和 broad Exception 是合理的

# 报表生成模块里大量 "算了中间变量但没写出来" 的情况, 需要熟悉报表逻辑的人审,
# 另开 PR 处理。目前暂时豁免 F401/F841/B007 避免阻塞 CI。
"api/services/document/rnpv_excel.py" = ["F401", "F841", "B007"]
"api/services/crm/resolve.py" = ["F841"]   # resolve.py:186 的 suggestions 变量另审

# FastAPI 的 Depends / Query / Header 等 helper 就是设计成放在默认参数里的,
# 告诉 bugbear 把它们当作"不可变调用",避免 B008 把 FastAPI 正确用法误报成 bug。
[lint.flake8-bugbear]
extend-immutable-calls = [
    "fastapi.Depends",
    "fastapi.Query",
    "fastapi.Header",
    "fastapi.Body",
    "fastapi.Path",
    "fastapi.Form",
    "fastapi.File",
    "fastapi.Cookie",
    "fastapi.Security",
]

[format]
# 风格默认和 Black 兼容
quote-style = "double"
indent-style = "space"
