# ── BD Go — Docker Compose ──
# Usage:
#   cp .env.example .env   # fill in secrets
#   docker compose up -d --build
#
# Postgres runs on the HOST (not in Docker).
# The backend container reaches it via host.docker.internal (Docker bridge gateway).

services:
  # ── FastAPI backend ──
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env
    environment:
      - CRM_DB_PATH=/data/crm.db
      - CRM_BACKEND=${CRM_BACKEND:-postgresql}
      - CRM_PG_DSN=${CRM_PG_DSN}
      - GUIDELINES_DB_PATH=/data/guidelines.db
      - BP_DIR=/data/BP
      - REPORTS_DIR=/data/Reports
    volumes:
      - ./data/guidelines.db:/data/guidelines.db:ro
      - ./data/BP:/data/BP
      - ./data/Reports:/data/Reports
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # ── Nginx reverse proxy ──
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      # - "443:443"  # uncomment when HTTPS certs are ready
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      # - ./nginx/certs:/etc/nginx/certs:ro  # uncomment for HTTPS
    depends_on:
      - backend
    restart: unless-stopped
