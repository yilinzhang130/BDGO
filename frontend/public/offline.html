<!DOCTYPE html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#1E3A8A" />
    <title>BD Go — 离线</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: Inter, -apple-system, sans-serif;
        background: #F8FAFF;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem;
        color: #0F172A;
      }
      .card {
        background: #fff;
        border-radius: 20px;
        padding: 48px 40px;
        max-width: 400px;
        width: 100%;
        text-align: center;
        box-shadow: 0 4px 24px rgba(30,58,138,0.08);
      }
      .icon {
        width: 64px; height: 64px;
        background: #EEF2FF;
        border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        margin: 0 auto 24px;
      }
      h1 { font-size: 22px; font-weight: 800; margin-bottom: 12px; }
      p { font-size: 14px; color: #64748B; line-height: 1.6; margin-bottom: 28px; }
      button {
        padding: 12px 28px;
        background: #1E3A8A;
        color: #fff;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        font-family: inherit;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#1E3A8A" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="1" y1="1" x2="23" y2="23"></line>
          <path d="M16.72 11.06A10.94 10.94 0 0 1 19 12.55"></path>
          <path d="M5 12.55a10.94 10.94 0 0 1 5.17-2.39"></path>
          <path d="M10.71 5.05A16 16 0 0 1 22.56 9"></path>
          <path d="M1.42 9a15.91 15.91 0 0 1 4.7-2.88"></path>
          <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
          <line x1="12" y1="20" x2="12.01" y2="20"></line>
        </svg>
      </div>
      <h1>您当前处于离线状态</h1>
      <p>请连接网络后重试。<br />已缓存的报告仍可在报告页面查看。</p>
      <button onclick="window.location.reload()">重新连接</button>
    </div>
  </body>
</html>
