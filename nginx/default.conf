# ── BD Go — Nginx reverse proxy ──
# HTTP first; uncomment the HTTPS server block when certs are ready.

# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_min_length 256;
gzip_vary on;

# Conditionally set the Connection header:
#   - real WebSocket upgrade  →  "upgrade"
#   - regular HTTP / SSE      →  "keep-alive"
#
# The original config hardcoded Connection: "upgrade" for ALL /api/ requests.
# For SSE, that causes nginx to attempt a protocol upgrade and can drop the
# stream immediately on some nginx builds.
map $http_upgrade $connection_upgrade {
    default   upgrade;
    ''        keep-alive;
}

upstream backend {
    # systemd uvicorn on the same host; adjust port in .env / bdgo-api.service
    server 127.0.0.1:8000;
    keepalive 16;   # reuse connections to the upstream
}

server {
    listen 80;
    server_name _;

    # Max upload size (BP/attachment files can be large)
    client_max_body_size 50M;

    # ── SSE streaming endpoints ────────────────────────────────
    # MUST come before the generic /api/ block (more-specific prefix wins).
    #
    # Two-layer buffering protection:
    #   1. proxy_buffering off  — nginx never accumulates chunks
    #   2. backend sends X-Accel-Buffering: no  — belt-and-suspenders
    #
    # Timeout matches httpx.AsyncClient(timeout=300) in streaming.py.
    # Add 10 s of headroom so nginx doesn't race the backend.
    location /api/chat {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        proxy_buffering    off;
        proxy_cache        off;

        proxy_read_timeout 310s;
        proxy_send_timeout 310s;
    }

    # ── General API proxy ──────────────────────────────────────
    location /api/ {
        proxy_pass         http://backend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;

        # Longer timeouts for report-generation (~5 min max)
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Static asset caching (Next.js build output) ───────────
    location /_next/static/ {
        proxy_pass http://backend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Default: proxy to frontend (when self-hosted) ─────────
    location / {
        # Frontend is on Vercel — this block is unused in production.
        # For self-hosted Next.js uncomment:
        # proxy_pass http://frontend:3000;
        # proxy_set_header Host $host;
        return 404;
    }
}

