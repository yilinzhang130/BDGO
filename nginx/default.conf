# ── BD Go — Nginx reverse proxy ──
# HTTP first; uncomment the HTTPS server block when certs are ready.

# Gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_min_length 256;
gzip_vary on;

upstream backend {
    server 172.17.0.1:8001;
}

server {
    listen 80;
    server_name _;

    # Max upload size (BP files can be large)
    client_max_body_size 50M;

    # ── API proxy ──
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / SSE upgrade support
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Longer timeouts for report-generation endpoints
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ── Static asset caching (Next.js build output) ──
    location /_next/static/ {
        proxy_pass http://backend;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # ── Default: proxy to frontend (when self-hosted) ──
    location / {
        # When frontend is on Vercel this block is unused.
        # For self-hosted Next.js, uncomment and point to the frontend service:
        # proxy_pass http://frontend:3000;
        # proxy_set_header Host $host;
        return 404;
    }
}

